<!DOCTYPE html>
<html lang="en">
<head>

    <title>Morning Routine Card</title>

    <style>

        body{
            background-color:#f5e6ef;
            font-family:Georgia;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
            flex-direction:column;
            }
        .card{
            width:500px;
            padding:40px;
            text-align:center;
            border-radius:35px;
            background: linear-gradient(to bottom right,
            #f3f3f3,
            #e6d8f2,
            #b9f3ec);
            box-shadow:0px 6px 20px rgba(0,0,0,0.2);
            border:4px solid #7c8796;
            position:relative;
            top:-40px;
        }
        h2{
            color:#4f5d6b;
            font-size:38px;
            margin-bottom:-25px;
        }
        h1{
            color:#4f5d6b;
            font-size:110px;
            margin-top:0;
            font-family:'Great Vibes', cursive;
            font-weight:lighter;
        }

        .box{

            background-color:#ddd6e8;

            padding:20px;

            margin:20px auto;

            width:350px;

            border-radius:30px;

            border:3px solid #5c6877;

            color:#4f5d6b;

            font-size:28px;

            font-weight:bold;

            box-shadow:5px 5px 0px #8c96a3;
        }

        p{
            margin-top:-10px;

            color:#4f5d6b;

            font-size:24px;

            text-align:center;
        }

    </style>

</head>

<body>

    <div class="card">

        <h2>My Summer</h2>

        <h1>Mornings..</h1>

        <div class="box">Wake up at 9am..</div>

        <div class="box">Fresh up..</div>

        <div class="box">Eat Breakfast..</div>

        <div class="box">Play with my Brother..</div>

        <div class="box">Try to do new CSS Projects..</div>

        <div class="box">Watch TV for 2 hours..</div>

    </div>

    <p><b>This is my routine on <i>Summer Mornings..</i></b></p>

</body>
</html>
