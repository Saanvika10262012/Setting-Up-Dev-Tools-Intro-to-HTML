<html>
    <head>
        <title>Forms</title>
    </head>
    <body>
        <fieldset>
            <form>
                <h1>Personal Details Form</h1><br>
                <label>Name</label><br>
                <input type="text" name="abc"><br>
                <label>Age</label><br>
                <input type="number" name="xyz"><br>
                <label>Date of Birth</label><br>
                <input type="date" name="def"><br>
                <label>Gender</label><br>
                <input type="radio" id="female" name="gender" value="female">Female<br>
                <input type="radio" id="male" name="gender" value="male">Male<br>
                <label>Company</label><br>
                <input type="text" name="pqr"><br>
                <label>Email ID</label><br>
                <input type="email" name="lmn"><br>
                <label>Contact Number</label><br>
                <input type="number" name="uvw"><br>
                <label>City</label><br>
                <input type="checkbox" id="city" value="Bangalore">Bangalore<br>
                <input type="checkbox" id="city" value="Hyderabad">Hyderabad<br>
                <input type="submit"><br>
                <input type="reset"><br>               
            </form>
        </fieldset>
    </body>
</html>
