<!Doctype html>
<html>
    <head>
        <style>
    /*The Animation Code*/
    @keyframes dancer{
        25% {background-color:lavenderblush}
        50% {background-color:lavender}
        75% {background-color:magenta}
        90% {background-color:blueviolet}
    }
    /*the element to apply animation to*/
    div {
        width: 100px;
        height: 300px;
        background-color: pink;
        animation-name: dancer;
        animation-duration: 5s;
    }
        </style>
    </head>
<body>
    <div>
    Dance...
    </div>
</body>
</html>
