<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            right:30px;
            border:3px solid blanchedalmond
        }
        div.position4{
            position:absolute;
            left:50px;
            border:3px solid rgb(236, 83, 134);
        }
        div.position3{
            position:relative;
            left:40px;
            border:3px solid plum;
        }
        div.position5{
            position:fixed;
            top:0px;
            right:20px;
            width:400px;
            border:3px solid palevioletred;
        }
        div.position2{
            position:sticky;
            top:1px;
            left:20px;
            width:100px;
            border:3px solid rosybrown;
        }
    </style>
</head>
<body>
    <h1>Positioning in CSS</h1>
    <div>
        1st Position..
    </div>
    <div class="position2">
