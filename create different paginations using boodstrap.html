<!DOCTYPE html>
<html lang="en">
<head>
    <title>Beautiful Bootstrap Pagination</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f4f7fc;
        }

        .pagination-card{
            max-width: 700px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .pagination .page-link{
            color: #0d6efd;
            border-radius: 10px;
            margin: 0 4px;
        }

        .pagination .active .page-link{
            background-color: #0d6efd;
            border-color: #0d6efd;
            color: white;
        }

        h1{
            margin-bottom: 20px;
        }

        p{
            color: gray;
        }
    </style>
</head>

<body>

<div class="pagination-card">
    <h1>Bootstrap Pagination</h1>
    <p>Example of a simple and attractive pagination design.</p>

    <nav>
        <ul class="pagination justify-content-center mt-4">

            <li class="page-item disabled">
                <a class="page-link" href="https://en.wikipedia.org/wiki/Indian_classical_dance">Previous</a>
            </li>

            <li class="page-item active">
                <a class="page-link" href="https://liberalarts.dpu.edu.in/blogs/ancient-indian-classical-dance-forms">1</a>
            </li>

            <li class="page-item">
                <a class="page-link" href="https://drishtiartcentre.com/drishti-art-centre/magazine/issue-5/kuchipudi-origin-history/">2</a>
            </li>

            <li class="page-item">
                <a class="page-link" href="https://en.wikipedia.org/wiki/Vempati_Chinna_Satyam">3</a>
            </li>

            <li class="page-item">
                <a class="page-link" href="https://en.wikipedia.org/wiki/Kuchipudi">4</a>
            </li>

            <li class="page-item">
                <a class="page-link" href="https://unacademy.com/content/nda/study-material/general-knowledge/importance-of-classical-dance/">Next</a>
            </li>

        </ul>
    </nav>
</div>

</body>
</html>
